
[workspace]
name = "ynab-il-importer"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.11"
pandas = ">=2.2"
openpyxl = ">=3.1"
xlrd = ">=2.0"
lxml = ">=6.0.2,<7"
python-dateutil = ">=2.9"
rapidfuzz = ">=3.6"
pydantic = ">=2.6"
typer = ">=0.12"
rich = ">=13.7"
pyyaml = ">=6.0"
ipykernel = ">=7.2.0,<8"
jupyter = ">=1.1.1,<2"
splink = ">=4.0.15,<5"
streamlit = ">=1.33"
polars = ">=1.39.3,<2"
pyarrow = ">=23.0.1,<24"

[pypi-dependencies]
ynab-il-importer = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=8.0"
ruff = ">=0.6"
mypy = ">=1.10"

[environments]
default = { features = ["dev"] }

[tasks]
lint = "ruff check ."
fmt = "ruff format ."
test = "pytest -q"
smoke = "python -m ynab_il_importer.cli --help"
normalize-context = "python scripts/normalize_context.py"
build-context-review = "python scripts/build_context_review.py"
sync-bank-matches = "python scripts/sync_bank_matches.py"
reconcile-bank-statement = "python scripts/reconcile_bank_statement.py"
normalize-previous-max = "python scripts/normalize_previous_max.py"
sync-card-matches = "python scripts/sync_card_matches.py"
reconcile-card-cycle = "python scripts/reconcile_card_cycle.py"
