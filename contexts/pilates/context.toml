name = "pilates"
budget_id_env = "YNAB_PILATES_BUDGET_ID"

[maps]
account_map = "../../mappings/pilates/account_name_map.csv"
fingerprint_map = "../../mappings/pilates/fingerprint_map.csv"
payee_map = "../../mappings/pilates/payee_map.csv"

[ynab]
normalized_name = "pilates_ynab_api_norm.parquet"

[[sources]]
id = "pilates_bank"
kind = "leumi"
raw_file = "Bankin pilates.dat"
normalized_name = "pilates_leumi_norm.parquet"
target_account_names = ["Bank Leumi 225237"]

[[sources]]
id = "pilates_card"
kind = "leumi_card_html"
raw_match = "^BankLeumi \\d+_\\d+_\\d+\\.html$"
normalized_name = "pilates_leumi_card_html_norm.parquet"
allow_reconciled_source = true
target_account_names = ["Credit card 0602"]
