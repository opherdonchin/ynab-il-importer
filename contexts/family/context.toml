name = "family"
budget_id_env = "YNAB_FAMILY_BUDGET_ID"

[maps]
account_map = "../../mappings/account_name_map.csv"
fingerprint_map = "../../mappings/fingerprint_map.csv"
payee_map = "../../mappings/payee_map.csv"

[ynab]
normalized_name = "family_ynab_api_norm.parquet"

[[sources]]
id = "family_bank"
kind = "leumi"
raw_file = "Bankin family.dat"
normalized_name = "family_leumi_norm.parquet"
target_account_names = ["Bank Leumi"]

[[sources]]
id = "family_card"
kind = "max"
raw_match = "^transaction-details_export_\\d+\\.xlsx$"
normalized_name = "family_max_norm.parquet"
allow_reconciled_source = true
target_account_names = ["Bank Leumi", "Liya X7195", "Opher X5898", "Opher x9922"]
